name: Publish Cloudways site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-cloudways
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        run: bun run build:cloudways

      - name: Verify static output
        run: |
          test -f dist/cloudways/index.html
          test -f dist/cloudways/privacy-policy/index.html
          test -f dist/cloudways/terms-of-use/index.html
          test -f dist/cloudways/accessibility/index.html
          test -f dist/cloudways/disclaimer/index.html
          test -f dist/cloudways/sitemap.xml

      - name: Prepare Cloudways files
        run: |
          mkdir cloudways-publish
          cp -a dist/cloudways/. cloudways-publish/

      - name: Publish cloudways branch
        working-directory: cloudways-publish
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b cloudways
          git add --all
          git commit -m "Publish Cloudways site from ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.git"
          git push --force origin cloudways
